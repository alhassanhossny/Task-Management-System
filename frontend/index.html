<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TASK - Hospital IT Task Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <style>
      [dir="rtl"] html { direction: rtl; overflow-y: auto; }
      [dir="rtl"] body { direction: rtl; overflow-y: auto; }
      [dir="rtl"] .MuiTableContainer-root { direction: rtl; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var lang = localStorage.getItem('i18nextLng') || 'ar';
        var dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = lang;
        document.documentElement.dir = dir;
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
